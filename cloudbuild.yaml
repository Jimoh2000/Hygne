# ════════════════════════════════════════════════════════════════
# HGyne — Google Cloud Build Pipeline (Convex + Clerk stack)
# ════════════════════════════════════════════════════════════════

substitutions:
  _REGION:  us-central1
  _SERVICE: hgyne
  _REPO:    hgyne-repo
  _IMAGE:   ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

options:
  logging:     CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Install dependencies ──────────────────────────────────────
  - name: node:20
    id: install
    entrypoint: npm
    args: [ci, --legacy-peer-deps]

  # ── 2. Deploy Convex functions (always before Docker build) ─────
  - name: node:20
    id: convex-deploy
    entrypoint: npx
    args: [convex, deploy, --cmd, 'npm run build']
    secretEnv: [CONVEX_DEPLOY_KEY]

  # ── 3. Fetch public build-time secrets ──────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: fetch-secrets
    entrypoint: bash
    args:
      - -c
      - |
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_CONVEX_URL        > /workspace/.convex_url
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY > /workspace/.clerk_key
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_PADDLE_CLIENT_TOKEN   > /workspace/.paddle_token
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_PADDLE_MONTHLY_PRICE_ID > /workspace/.paddle_monthly
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_PADDLE_YEARLY_PRICE_ID  > /workspace/.paddle_yearly
        echo "Secrets fetched."

  # ── 4. Build Docker image ────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg NEXT_PUBLIC_CONVEX_URL=$(cat /workspace/.convex_url) \
          --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(cat /workspace/.clerk_key) \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up \
          --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard \
          --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard \
          --build-arg NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=$(cat /workspace/.paddle_token) \
          --build-arg NEXT_PUBLIC_PADDLE_ENV=production \
          --build-arg NEXT_PUBLIC_PADDLE_MONTHLY_PRICE_ID=$(cat /workspace/.paddle_monthly) \
          --build-arg NEXT_PUBLIC_PADDLE_YEARLY_PRICE_ID=$(cat /workspace/.paddle_yearly) \
          --build-arg NEXT_PUBLIC_APP_URL=https://${_SERVICE}-${PROJECT_ID}.${_REGION}.run.app \
          -t ${_IMAGE}:${SHORT_SHA} \
          -t ${_IMAGE}:latest \
          .

  # ── 5. Push to Artifact Registry ────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args: [push, --all-tags, '${_IMAGE}']

  # ── 6. Deploy to Cloud Run ───────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=30s
      - --set-secrets=CLERK_SECRET_KEY=CLERK_SECRET_KEY:latest,CLERK_WEBHOOK_SECRET=CLERK_WEBHOOK_SECRET:latest,CLERK_JWT_ISSUER_DOMAIN=CLERK_JWT_ISSUER_DOMAIN:latest,PADDLE_API_KEY=PADDLE_API_KEY:latest,PADDLE_WEBHOOK_SECRET=PADDLE_WEBHOOK_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest
      - --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/CONVEX_DEPLOY_KEY/versions/latest
      env: CONVEX_DEPLOY_KEY

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest
